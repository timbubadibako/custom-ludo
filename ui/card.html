<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&amp;family=Quicksand:wght@700&amp;family=Inter:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#5b4300",
                        "on-secondary-fixed": "#251a00",
                        "on-primary": "#660027",
                        "surface-bright": "#2c3956",
                        "surface-dim": "#04122e",
                        "surface-container-highest": "#283451",
                        "outline": "#a9898d",
                        "foreplay-gold": "#FFD166",
                        "primary": "#ffb2bf",
                        "on-surface": "#d9e2ff",
                        "inverse-surface": "#d9e2ff",
                        "tertiary-fixed": "#ffd9e3",
                        "on-secondary": "#3f2e00",
                        "tertiary-fixed-dim": "#edb8c8",
                        "on-surface-variant": "#e1bec3",
                        "on-tertiary-fixed": "#30111d",
                        "on-primary-fixed-variant": "#90003b",
                        "surface-tint": "#ffb2bf",
                        "soft-pink": "#FEC8D8",
                        "surface-variant": "#283451",
                        "on-error": "#690005",
                        "on-error-container": "#ffdad6",
                        "deep-blue": "#14213D",
                        "on-secondary-container": "#fff7ee",
                        "inverse-on-surface": "#23304d",
                        "on-tertiary": "#482632",
                        "secondary-fixed-dim": "#edc157",
                        "on-tertiary-fixed-variant": "#623b49",
                        "surface-container-lowest": "#010d29",
                        "error": "#ffb4ab",
                        "jazz-magenta": "#FF4D80",
                        "danger-red": "#E63946",
                        "tertiary": "#edb8c8",
                        "secondary": "#edc157",
                        "on-background": "#d9e2ff",
                        "outline-variant": "#5a4044",
                        "inverse-primary": "#b90e4f",
                        "primary-fixed-dim": "#ffb2bf",
                        "surface": "#04122e",
                        "on-primary-container": "#5a0022",
                        "error-container": "#93000a",
                        "night-black": "#24242A",
                        "surface-container-high": "#1d2946",
                        "surface-container": "#121f3b",
                        "primary-container": "#ff4d80",
                        "background": "#04122e",
                        "on-tertiary-container": "#411f2c",
                        "on-primary-fixed": "#3f0016",
                        "tertiary-container": "#b38493",
                        "surface-container-low": "#0d1b36",
                        "secondary-container": "#906d00",
                        "primary-fixed": "#ffd9de",
                        "snow-white": "#FAFAFA",
                        "secondary-fixed": "#ffdf9b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "safe-area": "20px",
                        "base": "8px",
                        "lg": "24px",
                        "xl": "32px",
                        "sm": "8px",
                        "xxl": "48px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Montserrat"],
                        "action-text": ["Inter"],
                        "headline-md": ["Montserrat"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Quicksand"],
                        "display-lg": ["Quicksand"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "action-text": ["20px", { "lineHeight": "1.4", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.4", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }]
                    },
                    "animation": {
                        "pulse-slow": "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
                        "float": "float 3s ease-in-out infinite",
                        "spin-slow": "spin 8s linear infinite"
                    },
                    "keyframes": {
                        "float": {
                            "0%, 100%": { transform: "translateY(0)" },
                            "50%": { transform: "translateY(-10px)" }
                        }
                    }
                },
            },
        }
    </script>
    <style>
        @keyframes sparkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0);
            }

            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 2s infinite ease-in-out;
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen font-body-md overflow-hidden">
    <!-- Underlying Gameplay Screen (Simulated) -->
    <main class="fixed inset-0 z-0 flex flex-col p-safe-area opacity-20 grayscale-[0.8]">
        <div class="flex justify-between items-center mb-xl">
            <div class="flex items-center gap-md">
                <div
                    class="w-12 h-12 rounded-full bg-surface-container-high border-2 border-foreplay-gold flex items-center justify-center">
                    <span class="material-symbols-outlined text-foreplay-gold">person</span>
                </div>
                <div>
                    <p class="font-label-md text-label-md text-snow-white">Current Player</p>
                    <p class="font-headline-md text-headline-md text-foreplay-gold">Marco</p>
                </div>
            </div>
            <div class="bg-night-black/80 p-base rounded-xl border border-snow-white/10 flex items-center gap-xs">
                <span class="material-symbols-outlined text-jazz-magenta"
                    style="font-variation-settings: 'FILL' 1;">favorite</span>
                <span class="font-label-md text-label-md">240 pts</span>
            </div>
        </div>
        <!-- Grid Board Placeholder -->
        <div
            class="flex-grow grid grid-cols-4 gap-base p-base bg-night-black/40 rounded-xxl border border-snow-white/5">
            <div class="bg-deep-blue rounded-xl flex items-center justify-center border border-snow-white/10"></div>
            <div class="bg-deep-blue rounded-xl flex items-center justify-center border border-snow-white/10"></div>
            <div class="bg-jazz-magenta/20 rounded-xl flex items-center justify-center border border-jazz-magenta/30">
                <span class="material-symbols-outlined text-jazz-magenta">local_fire_department</span>
            </div>
            <div class="bg-deep-blue rounded-xl flex items-center justify-center border border-snow-white/10"></div>
        </div>
    </main>
    <!-- Modal Overlay (Deeply Blurred) -->
    <div class="fixed inset-0 z-[100] flex items-center justify-center p-xl backdrop-blur-3xl bg-surface/80">
        <!-- Explosive ForeplayActionModal -->
        <div class="relative w-full max-w-md">
            <!-- Neon Border Outer Wrapper -->
            <div class="relative bg-jazz-magenta rounded-[2.5rem] p-1.5 shadow-[0_0_80px_-10px_rgba(255,77,128,0.7)]">
                <!-- Glassmorphism Card Body -->
                <div
                    class="relative bg-surface-container-highest/90 backdrop-blur-md rounded-[2.25rem] p-xl flex flex-col items-center text-center overflow-hidden">
                    <!-- Confetti/Sparkle Background Effect -->
                    <div class="absolute inset-0 pointer-events-none opacity-40">
                        <div class="sparkle" style="top: 10%; left: 20%; animation-delay: 0.1s;"></div>
                        <div class="sparkle" style="top: 30%; left: 80%; animation-delay: 0.5s;"></div>
                        <div class="sparkle" style="top: 70%; left: 15%; animation-delay: 1.2s;"></div>
                        <div class="sparkle" style="top: 85%; left: 70%; animation-delay: 0.8s;"></div>
                        <div class="sparkle" style="top: 50%; left: 50%; animation-delay: 1.5s;"></div>
                        <div class="absolute top-0 right-0 w-32 h-32 bg-jazz-magenta/20 blur-[50px] -mr-16 -mt-16">
                        </div>
                        <div class="absolute bottom-0 left-0 w-32 h-32 bg-foreplay-gold/20 blur-[50px] -ml-16 -mb-16">
                        </div>
                    </div>
                    <!-- Icon & Header Section -->
                    <div class="relative mb-lg flex flex-col items-center">
                        <div
                            class="w-24 h-24 bg-gradient-to-tr from-jazz-magenta to-foreplay-gold rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(255,77,128,0.6)] mb-md animate-float">
                            <span class="text-5xl">🎭</span>
                        </div>
                        <h2
                            class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-jazz-magenta uppercase tracking-widest drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
                            Naughty Dare</h2>
                    </div>
                    <!-- Instruction Text -->
                    <div class="relative mb-xl px-md">
                        <p class="font-headline-md text-headline-md text-snow-white leading-tight font-bold italic">
                            "Peragakan gaya tertentu selama 1 menit penuh!"
                        </p>
                    </div>
                    <!-- Animated Countdown Timer -->
                    <div class="relative mb-xxl">
                        <div
                            class="flex flex-col items-center justify-center w-32 h-32 border-4 border-jazz-magenta/30 rounded-full relative">
                            <svg class="absolute inset-0 w-full h-full -rotate-90">
                                <circle class="text-jazz-magenta" cx="64" cy="64" fill="transparent" r="60"
                                    stroke="currentColor" stroke-dasharray="377" stroke-dashoffset="100"
                                    stroke-width="4"></circle>
                            </svg>
                            <span
                                class="font-display-lg text-headline-lg text-snow-white tabular-nums animate-pulse-slow">00:59</span>
                            <span
                                class="text-[10px] font-label-md text-jazz-magenta uppercase tracking-tighter">Remaining</span>
                        </div>
                    </div>
                    <!-- Action Buttons -->
                    <div class="relative w-full space-y-md">
                        <button
                            class="w-full bg-gradient-to-r from-jazz-magenta to-primary py-md rounded-2xl font-action-text text-action-text text-snow-white shadow-[0_10px_30px_rgba(255,77,128,0.5)] hover:scale-[1.02] active:scale-95 transition-all relative overflow-hidden group">
                            <span class="relative z-10">ACCEPT ACTION</span>
                            <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 transition-opacity">
                            </div>
                        </button>
                        <button
                            class="w-full bg-night-black/40 border border-snow-white/20 text-snow-white py-md rounded-2xl font-label-md text-label-md flex flex-col items-center justify-center gap-xs hover:bg-night-black/60 transition-colors">
                            <span class="opacity-80">SKIP CHALLENGE</span>
                            <div
                                class="flex items-center gap-1 px-3 py-1 bg-night-black rounded-full border border-danger-red/30">
                                <span class="material-symbols-outlined text-[12px] text-danger-red"
                                    style="font-variation-settings: 'FILL' 1;">bolt</span>
                                <span class="text-[10px] font-bold text-danger-red">SKIPS LEFT: 2</span>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Shared TopAppBar -->
    <header
        class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-safe py-base bg-surface/80 backdrop-blur-xl border-b border-snow-white/10 shadow-md">
        <div class="font-display-lg text-display-lg text-jazz-magenta">Ludo Foreplay Night</div>
        <div class="flex items-center gap-md">
            <span
                class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity cursor-pointer">music_note</span>
            <span
                class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity cursor-pointer">settings</span>
            <button
                class="bg-primary-container text-on-primary-container px-md py-xs rounded-lg font-label-md text-label-md hover:opacity-80 active:scale-95 transition-all">Finish
                Now</button>
        </div>
    </header>
    <!-- Shared BottomNavBar -->
    <nav
        class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-md pb-safe pt-xs bg-night-black/90 backdrop-blur-2xl border-t border-snow-white/10 shadow-2xl rounded-t-xl">
        <div
            class="flex flex-col items-center justify-center bg-primary-container/20 text-jazz-magenta rounded-xl px-md py-xs scale-90 transition-transform duration-200">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">casino</span>
            <span class="font-label-md text-label-md">Game</span>
        </div>
        <div
            class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-soft-pink transition-colors">
            <span class="material-symbols-outlined">group</span>
            <span class="font-label-md text-label-md">Players</span>
        </div>
        <div
            class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-soft-pink transition-colors">
            <span class="material-symbols-outlined">history</span>
            <span class="font-label-md text-label-md">History</span>
        </div>
        <div
            class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:text-soft-pink transition-colors">
            <span class="material-symbols-outlined">layers</span>
            <span class="font-label-md text-label-md">Modes</span>
        </div>
    </nav>
</body>

</html>
